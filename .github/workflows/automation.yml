name: Test & Publish Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-format:
    name: Lint & Style Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install "ruff==0.15.21"

      - name: Run Ruff Linter
        run: ruff check src/ tests/

      - name: Check Code Formatting
        run: ruff format --check src/ tests/

  security-checks:
    name: Security Scanning (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: pip install bandit

      - name: Run Bandit (SAST Security Scan)
        run: bandit -r src/ -ll -ii

  automated-testing:
    name: Run Tests (${{ matrix.os }} - Py ${{ matrix.python-version }})
    needs: [lint-and-format, security-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Package & Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Standard Unit & Integration Tests
        run: pytest tests/ --ignore=tests/test_properties.py -v --tb=short

      - name: Run Hypothesis Property-Based Tests
        run: pytest tests/test_properties.py -v --tb=short

  build-and-verify:
    name: Build & Package Verification
    needs: automated-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Build and Twine
        run: pip install build twine

      - name: Build Package (wheel & sdist)
        run: python -m build

      - name: Verify Package Metadata
        run: twine check dist/*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentcache-dist
          path: dist/
          retention-days: 5

  publish-to-pypi:
    name: Publish to PyPI
    needs: build-and-verify
    # Only run on pushes of version tags (e.g. v0.9.8) to the main branch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentcache-dist
          path: dist/

      - name: Publish Package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
