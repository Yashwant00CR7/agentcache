name: Test Automation Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "ROADMAP.md"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "ROADMAP.md"
      - "**/*.md"
  workflow_dispatch:
  schedule:
    # Run every Sunday at midnight to check for dependency updates and slow/regression bugs
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-format:
    name: Lint & Style Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check src/ tests/

      - name: Check Code Formatting
        run: ruff format --check src/ tests/

  automated-testing:
    name: Run Tests (${{ matrix.os }} - Py ${{ matrix.python-version }})
    needs: lint-and-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Standard Unit & Integration Tests
        run: pytest tests/ --ignore=tests/test_properties.py -v --tb=short

      - name: Run Hypothesis Property-Based Tests
        run: pytest tests/test_properties.py -v --tb=short

  build-verification:
    name: Build & Package Verification
    needs: automated-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Tool
        run: pip install build

      - name: Build Package (wheel & sdist)
        run: python -m build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentcache-dist
          path: dist/
          retention-days: 5

  deploy-to-huggingface:
    name: Deploy to Hugging Face Spaces
    needs: [lint-and-format, automated-testing, build-verification]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action Bot"
          git remote add hf https://Yash030:$HF_TOKEN@huggingface.co/spaces/Yash030/agentmemory-python
          git push --force hf main:main

